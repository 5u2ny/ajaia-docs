<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ajaia Docs — Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { color-scheme: light; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .tiptap { min-height: 420px; outline: none; }
    .tiptap h1 { font-size: 1.875rem; font-weight: 700; margin: 1rem 0 0.5rem; }
    .tiptap h2 { font-size: 1.5rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    .tiptap h3 { font-size: 1.25rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    .tiptap p { margin: 0.5rem 0; line-height: 1.7; min-height: 1.7em; }
    .tiptap ul { list-style: disc; padding-left: 1.5rem; margin: 0.5rem 0; }
    .tiptap ol { list-style: decimal; padding-left: 1.5rem; margin: 0.5rem 0; }
    .tiptap u { text-decoration: underline; }
    .tiptap blockquote { border-left: 3px solid #e5e7eb; padding-left: 1rem; color: #475569; margin: 0.5rem 0; }
    .tiptap hr { border: 0; border-top: 1px solid #e5e7eb; margin: 1rem 0; }
    .tiptap[placeholder]:empty::before { content: attr(placeholder); color: #9ca3af; pointer-events: none; }
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; }
    .badge.owner { background: #dbeafe; color: #1e40af; }
    .badge.shared { background: #dcfce7; color: #166534; }
    .toolbar-btn { padding: 6px 10px; border-radius: 6px; font-size: 14px; color: #374151; }
    .toolbar-btn:hover { background: #f3f4f6; }
    .toolbar-btn.active { background: #e5e7eb; color: #111; }
    .ring-focus:focus { box-shadow: 0 0 0 2px rgba(59,130,246,0.4); outline: none; }
    .fade-in { animation: fadeIn 120ms ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    /* Focus mode: hide chrome, center text */
    body.focus-mode .app-chrome { display: none; }
    body.focus-mode .outline-sidebar { display: none; }
    body.focus-mode main.editor-main { max-width: 720px; margin: 0 auto; padding-top: 72px; }
    body.focus-mode .toolbar-sticky { opacity: 0.2; transition: opacity .15s; }
    body.focus-mode .toolbar-sticky:hover { opacity: 1; }
    .outline-link { cursor: pointer; }
    .outline-link:hover { color: #1e40af; }
    /* Scrollbar hidden */
    .outline-scroll::-webkit-scrollbar { width: 6px; }
    .outline-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }
    kbd { display: inline-flex; align-items: center; padding: 1px 6px; border: 1px solid #cbd5e1; border-bottom-width: 2px; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 11px; color: #334155; background: #f8fafc; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="app"></div>

  <script>
    // ---------- seeded data ----------
    const USERS = [
      { id: "u_alex", name: "Alex", email: "alex@demo.app" },
      { id: "u_maya", name: "Maya", email: "maya@demo.app" },
      { id: "u_jordan", name: "Jordan", email: "jordan@demo.app" },
    ];

    const now = Date.now();
    const state = {
      user: null,
      view: "login",
      activeDocId: null,
      modal: null, // "share" | "palette" | "ai" | null
      toast: null,
      focusMode: false,
      aiBubble: null, // { x, y, selection: {start, end}, selectedText }
      slashMenu: null, // { x, y, range }
      slashQuery: "",
      slashIndex: 0,
      paletteQuery: "",
      paletteIndex: 0,
      docs: [
        {
          id: "d1", title: "Q2 planning notes", ownerId: "u_alex",
          sharedWith: [{ userId: "u_maya" }],
          updatedAt: now - 1000 * 60 * 8,
          html: '<h1>Q2 planning</h1><p>Three bets for the quarter:</p><ul><li><strong>Ship the editor.</strong> Ajaia wants a demo by Monday.</li><li><em>Cut scope aggressively.</em> No realtime, no comments.</li><li>Close the loop on <u>sharing + access control</u>.</li></ul><h2>Decisions</h2><p>Owner · Due date · Notes — see below.</p><h3>Risks</h3><p>Prisma binary blocking in sandbox; handled with a type stub. Not a runtime concern.</p>',
        },
        {
          id: "d2", title: "Meeting prep — 4/18", ownerId: "u_alex", sharedWith: [],
          updatedAt: now - 1000 * 60 * 60 * 3,
          html: '<h2>Goals</h2><ol><li>Demo the vertical slice end-to-end.</li><li>Explain tradeoffs in &lt;90 seconds.</li><li>Show the Playwright test log.</li></ol><h2>Talking points</h2><p>Lean into discipline: ship five things well instead of ten things halfway.</p>',
        },
        {
          id: "d3", title: "Shared: roadmap draft", ownerId: "u_maya",
          sharedWith: [{ userId: "u_alex" }],
          updatedAt: now - 1000 * 60 * 60 * 28,
          html: '<h1>Roadmap draft</h1><p>Rough cut — expect this to change once we lock scope with Jordan.</p><p><strong>Next week:</strong> share flow + access denial. <em>Nice to have:</em> export to .md.</p>',
        },
      ],
      saveState: "idle",
      saveTimer: null,
    };

    // ---------- helpers ----------
    const $ = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
    const escape = s => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
    function timeAgo(ms) {
      const diff = Math.max(1, (Date.now() - ms) / 1000);
      if (diff < 60) return Math.floor(diff) + "s ago";
      if (diff < 3600) return Math.floor(diff / 60) + "m ago";
      if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
      return Math.floor(diff / 86400) + "d ago";
    }
    function extractText(html, max = 160) {
      const div = document.createElement("div");
      div.innerHTML = html;
      const text = (div.textContent || "").trim();
      return text.length > max ? text.slice(0, max) + "…" : text;
    }
    function userById(id) { return USERS.find(u => u.id === id); }
    function toast(msg, type = "info") {
      state.toast = { msg, type };
      render();
      setTimeout(() => { if (state.toast && state.toast.msg === msg) { state.toast = null; render(); } }, 2400);
    }

    function docsForUser(userId) {
      const owned = state.docs.filter(d => d.ownerId === userId);
      const shared = state.docs.filter(d => d.ownerId !== userId && d.sharedWith.some(s => s.userId === userId));
      return { owned, shared };
    }
    function canAccess(doc, userId) {
      if (!doc) return false;
      return doc.ownerId === userId || doc.sharedWith.some(s => s.userId === userId);
    }

    // ---------- render ----------
    function render(partial) {
      const root = $("#app");
      let view = "";
      if (!state.user) view = renderLogin();
      else if (state.view === "dashboard") view = renderDashboard();
      else if (state.view === "editor") view = renderEditor();
      else if (state.view === "unauthorized") view = renderUnauthorized();

      const toastHtml = state.toast
        ? `<div class="fixed bottom-4 right-4 z-50 fade-in">
             <div class="rounded-lg shadow-lg px-4 py-3 text-sm ${state.toast.type === "error" ? "bg-red-600 text-white" : "bg-slate-900 text-white"}">${escape(state.toast.msg)}</div>
           </div>` : "";

      const modalHtml = state.modal === "share" ? renderShareModal()
                      : state.modal === "palette" ? renderCommandPalette()
                      : "";

      const floatMenus = (state.aiBubble ? renderAIBubble() : "") + (state.slashMenu ? renderSlashMenu() : "");

      root.innerHTML = view + modalHtml + floatMenus + toastHtml;
      document.body.classList.toggle("focus-mode", state.focusMode);
      bind();
      // Focus the palette input after render if open
      if (state.modal === "palette") { setTimeout(() => $("#palette-input")?.focus(), 10); }
    }

    // ---------- login ----------
    function renderLogin() {
      return `
        <div class="min-h-screen flex items-center justify-center p-6">
          <div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-slate-200 p-8 fade-in">
            <div class="flex items-center gap-2 mb-6">
              <div class="w-8 h-8 rounded-md bg-blue-600 text-white flex items-center justify-center font-bold">A</div>
              <div class="font-semibold text-lg">Ajaia Docs</div>
            </div>
            <h1 class="text-2xl font-semibold mb-1">Sign in</h1>
            <p class="text-sm text-slate-500 mb-6">Demo build — pick a seeded account to continue.</p>

            <form id="login-form" class="space-y-3">
              <label class="block">
                <span class="text-sm text-slate-700">Email</span>
                <input id="login-email" value="alex@demo.app" class="ring-focus mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
              </label>
              <label class="block">
                <span class="text-sm text-slate-700">Password</span>
                <input id="login-password" type="password" value="password123" class="ring-focus mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm" />
              </label>
              <button class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-md px-3 py-2 text-sm font-medium">Sign in</button>
            </form>

            <div class="mt-6 pt-6 border-t border-slate-200">
              <p class="text-xs font-medium text-slate-500 mb-2">Seeded accounts (click to switch):</p>
              <div class="space-y-1">
                ${USERS.map(u => `
                  <button data-seed-email="${u.email}" class="w-full text-left text-xs px-2 py-1.5 rounded hover:bg-slate-100 flex justify-between">
                    <span class="font-medium">${u.name}</span>
                    <span class="text-slate-500">${u.email} · password123</span>
                  </button>
                `).join("")}
              </div>
            </div>

            <p class="text-xs text-slate-400 mt-4 text-center">Tip: press <kbd>⌘</kbd> <kbd>K</kbd> anywhere once signed in.</p>
          </div>
        </div>
      `;
    }

    // ---------- dashboard ----------
    function renderDashboard() {
      const { owned, shared } = docsForUser(state.user.id);
      return `
        ${renderTopBar()}
        <main class="max-w-5xl mx-auto px-6 py-8 fade-in">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h1 class="text-2xl font-semibold">Hi, ${escape(state.user.name)}</h1>
              <p class="text-sm text-slate-500">Create a doc, import a file, or jump into something shared with you. <button id="btn-palette" class="text-blue-600 hover:underline ml-1">Press <kbd>⌘K</kbd> to open the command palette.</button></p>
            </div>
            <div class="flex items-center gap-2">
              <button id="btn-import" class="inline-flex items-center gap-1.5 rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium hover:bg-slate-50">
                <span>⬆</span> Import .txt or .md
              </button>
              <button id="btn-new" class="inline-flex items-center gap-1.5 rounded-md bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 text-sm font-medium">
                <span>＋</span> New document
              </button>
            </div>
          </div>

          ${renderDocSection("Your documents", owned, "owner")}
          ${renderDocSection("Shared with me", shared, "shared")}
        </main>
        <input id="import-input" type="file" accept=".txt,.md,.markdown" class="hidden" />
      `;
    }

    function renderDocSection(title, docs, kind) {
      return `
        <section class="mb-10">
          <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500 mb-3">${title}</h2>
          ${docs.length === 0 ? `
            <div class="rounded-lg border border-dashed border-slate-300 bg-white p-8 text-center text-sm text-slate-500">
              ${kind === "owner" ? "No documents yet. Click <b>New document</b> to start." : "Nothing shared with you yet."}
            </div>` : `
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
              ${docs.map(d => renderCard(d, kind)).join("")}
            </div>`}
        </section>
      `;
    }

    function renderCard(d, kind) {
      const owner = userById(d.ownerId);
      return `
        <button data-open-doc="${d.id}" class="text-left bg-white border border-slate-200 hover:border-blue-400 hover:shadow-sm rounded-lg p-4 transition">
          <div class="flex items-start justify-between gap-2">
            <h3 class="font-medium line-clamp-1">${escape(d.title)}</h3>
            <span class="badge ${kind === "owner" ? "owner" : "shared"}">${kind === "owner" ? "Owned" : "Shared"}</span>
          </div>
          <p class="mt-2 text-xs text-slate-500 line-clamp-2">${escape(extractText(d.html))}</p>
          <div class="mt-3 text-xs text-slate-400 flex justify-between">
            <span>${kind === "owner" ? "You" : escape(owner?.name || "?")}</span>
            <span>Updated ${timeAgo(d.updatedAt)}</span>
          </div>
        </button>
      `;
    }

    // ---------- editor ----------
    function renderEditor() {
      const doc = state.docs.find(d => d.id === state.activeDocId);
      if (!doc) return renderUnauthorized();
      if (!canAccess(doc, state.user.id)) return renderUnauthorized();
      const isOwner = doc.ownerId === state.user.id;

      return `
        ${renderTopBar(true, doc)}
        <div class="flex max-w-[1400px] mx-auto">
          <aside class="outline-sidebar w-56 shrink-0 px-4 py-6 border-r border-slate-200 bg-white/50 min-h-screen outline-scroll overflow-auto sticky top-[52px] self-start max-h-[calc(100vh-52px)]" id="outline-container">
            ${renderOutline(doc)}
          </aside>
          <main class="editor-main flex-1 px-8 py-6 fade-in">
            <div class="flex items-center gap-2 mb-3">
              <span class="badge ${isOwner ? "owner" : "shared"}">${isOwner ? "Owned" : "Shared with you"}</span>
              <span class="text-xs text-slate-400">${isOwner ? "You are the owner" : "Owner: " + escape(userById(doc.ownerId)?.name)}</span>
              <div class="ml-auto flex items-center gap-1">
                <button id="btn-focus" class="app-chrome text-xs rounded-md border border-slate-200 px-2 py-1 hover:bg-slate-100" title="Toggle focus mode (F)">${state.focusMode ? "Exit focus" : "Focus mode"}</button>
              </div>
            </div>
            <input id="doc-title" value="${escape(doc.title)}" class="w-full text-3xl font-semibold bg-transparent outline-none mb-1 ring-focus rounded" />
            <div class="text-xs text-slate-400 mb-4 flex items-center gap-3" id="footer-meta">
              <span id="save-indicator">Saved · ${timeAgo(doc.updatedAt)}</span>
              <span class="text-slate-300">·</span>
              <span id="word-count">0 words · 0 min read</span>
            </div>

            <div class="toolbar-sticky sticky top-[52px] z-10 bg-white border border-slate-200 rounded-lg px-2 py-1 flex flex-wrap items-center gap-1 mb-3">
              ${renderToolbarButton("bold", "<b>B</b>", "Ctrl+B")}
              ${renderToolbarButton("italic", "<i>I</i>", "Ctrl+I")}
              ${renderToolbarButton("underline", "<u>U</u>", "Ctrl+U")}
              <span class="w-px h-5 bg-slate-200 mx-1"></span>
              ${renderToolbarButton("h1", "H1")}
              ${renderToolbarButton("h2", "H2")}
              ${renderToolbarButton("h3", "H3")}
              ${renderToolbarButton("p", "¶")}
              <span class="w-px h-5 bg-slate-200 mx-1"></span>
              ${renderToolbarButton("ul", "• List")}
              ${renderToolbarButton("ol", "1. List")}
              <span class="w-px h-5 bg-slate-200 mx-1"></span>
              ${renderToolbarButton("hr", "—")}
              ${renderToolbarButton("quote", "❝")}
              <span class="ml-auto text-[11px] text-slate-400 pr-2 hidden sm:block">Type <kbd>/</kbd> for commands · select text for <kbd>AI</kbd></span>
            </div>

            <div
              id="editor"
              class="tiptap prose max-w-none bg-white border border-slate-200 rounded-lg p-6 ring-focus"
              contenteditable="true"
              placeholder="Start writing — press / for commands"
            >${doc.html}</div>
          </main>
        </div>
      `;
    }

    function renderToolbarButton(cmd, label, hint) {
      return `<button data-cmd="${cmd}" class="toolbar-btn" ${hint ? `title="${hint}"` : ""}>${label}</button>`;
    }

    // ---------- outline sidebar ----------
    function renderOutline(doc) {
      const div = document.createElement("div");
      div.innerHTML = doc.html;
      const headings = Array.from(div.querySelectorAll("h1, h2, h3"));
      if (!headings.length) {
        return `<p class="text-xs text-slate-400">No headings yet. Use <kbd>/</kbd> or the toolbar.</p>`;
      }
      return `
        <p class="text-[11px] font-semibold uppercase text-slate-500 tracking-wide mb-3">Outline</p>
        <ul class="space-y-1 text-sm">
          ${headings.map((h, i) => {
            const level = parseInt(h.tagName.slice(1));
            const text = h.textContent || `(empty)`;
            return `<li class="outline-link text-slate-600 hover:text-blue-700" data-outline-idx="${i}" style="padding-left:${(level-1) * 12}px; font-size:${14 - (level-1)}px; font-weight:${level === 1 ? 600 : 400}">${escape(text)}</li>`;
          }).join("")}
        </ul>
      `;
    }

    // ---------- top bar ----------
    function renderTopBar(showDocActions = false, doc = null) {
      const isOwner = doc && doc.ownerId === state.user.id;
      return `
        <header class="app-chrome sticky top-0 z-20 bg-white/90 backdrop-blur border-b border-slate-200">
          <div class="max-w-[1400px] mx-auto px-6 h-[52px] flex items-center justify-between">
            <div class="flex items-center gap-3">
              ${state.view === "editor"
                ? `<button id="btn-back" class="text-sm text-slate-600 hover:text-slate-900 flex items-center gap-1"><span>←</span> Dashboard</button>`
                : `<div class="flex items-center gap-2">
                     <div class="w-6 h-6 rounded bg-blue-600 text-white flex items-center justify-center font-bold text-sm">A</div>
                     <div class="font-semibold">Ajaia Docs</div>
                   </div>`}
            </div>
            <div class="flex items-center gap-2">
              <button id="btn-open-palette" title="Command palette (⌘K)" class="text-xs rounded-md border border-slate-200 px-2 py-1 hover:bg-slate-100">
                <kbd>⌘</kbd> <kbd>K</kbd>
              </button>
              ${showDocActions && isOwner ? `<button id="btn-share" class="text-sm bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-md px-3 py-1.5">Share</button>` : ""}
              <div class="text-sm text-slate-600 hidden sm:block ml-2">${escape(state.user.name)}</div>
              <select id="user-switcher" class="text-xs rounded border border-slate-300 px-2 py-1 bg-white" title="Switch preview user">
                ${USERS.map(u => `<option value="${u.id}" ${u.id === state.user.id ? "selected" : ""}>${u.name}</option>`).join("")}
              </select>
              <button id="btn-logout" class="text-sm text-slate-600 hover:text-slate-900">Sign out</button>
            </div>
          </div>
        </header>
      `;
    }

    // ---------- share modal ----------
    function renderShareModal() {
      const doc = state.docs.find(d => d.id === state.activeDocId);
      if (!doc) return "";
      const owner = userById(doc.ownerId);
      return `
        <div class="fixed inset-0 z-40 bg-black/30 flex items-center justify-center p-4 fade-in" id="modal-bg">
          <div class="bg-white w-full max-w-md rounded-xl shadow-xl p-5" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-lg font-semibold">Share document</h3>
              <button id="modal-close" class="text-slate-500 hover:text-slate-900">✕</button>
            </div>
            <form id="share-form" class="flex items-center gap-2">
              <input id="share-email" placeholder="Collaborator email…" class="flex-1 ring-focus rounded-md border border-slate-300 px-3 py-2 text-sm" />
              <button class="bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-md px-3 py-2">Share</button>
            </form>
            <p id="share-error" class="text-xs text-red-600 mt-2 hidden"></p>
            <div class="mt-5">
              <p class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-2">Who has access</p>
              <ul class="space-y-1 text-sm">
                <li class="flex justify-between items-center py-1.5 px-2 rounded bg-slate-50">
                  <span><b>${escape(owner.name)}</b> <span class="text-slate-500">(${escape(owner.email)})</span></span>
                  <span class="text-xs text-blue-700">Owner</span>
                </li>
                ${doc.sharedWith.map(s => {
                  const u = userById(s.userId);
                  return `<li class="flex justify-between items-center py-1.5 px-2 rounded hover:bg-slate-50">
                    <span>${escape(u.name)} <span class="text-slate-500">(${escape(u.email)})</span></span>
                    <button data-remove-share="${u.id}" class="text-xs text-red-600 hover:underline">Remove</button>
                  </li>`;
                }).join("")}
              </ul>
            </div>
          </div>
        </div>
      `;
    }

    // ---------- command palette (Cmd+K) ----------
    function paletteItems() {
      const q = state.paletteQuery.toLowerCase();
      const base = [
        { id: "new", kind: "action", label: "New document", hint: "Create a blank doc", icon: "＋" },
        { id: "import", kind: "action", label: "Import .txt or .md", hint: "Upload a file", icon: "⬆" },
        { id: "focus", kind: "action", label: state.focusMode ? "Exit focus mode" : "Enter focus mode", hint: "Hide chrome, center text", icon: "◎" },
        { id: "logout", kind: "action", label: "Sign out", hint: `As ${state.user?.name}`, icon: "⎋" },
      ];
      const docs = state.docs
        .filter(d => canAccess(d, state.user.id))
        .map(d => ({ id: "doc_" + d.id, kind: "doc", label: d.title, hint: d.ownerId === state.user.id ? "Owned · " + timeAgo(d.updatedAt) : "Shared · " + timeAgo(d.updatedAt), icon: "📄", docId: d.id }));
      const all = [...base, ...docs];
      if (!q) return all;
      return all.filter(it => (it.label + " " + it.hint).toLowerCase().includes(q));
    }

    function renderCommandPalette() {
      const items = paletteItems();
      const idx = Math.min(state.paletteIndex, Math.max(items.length - 1, 0));
      return `
        <div class="fixed inset-0 z-50 bg-black/30 flex items-start justify-center p-6 fade-in" id="palette-bg">
          <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl mt-24" onclick="event.stopPropagation()">
            <div class="px-4 py-3 border-b border-slate-200 flex items-center gap-2">
              <span class="text-slate-400">⌘</span>
              <input id="palette-input" value="${escape(state.paletteQuery)}" placeholder="Search docs or run a command…" class="flex-1 bg-transparent outline-none text-sm" />
              <kbd class="text-[10px] text-slate-400">esc</kbd>
            </div>
            <div class="max-h-80 overflow-auto p-2">
              ${items.length === 0 ? `<div class="text-xs text-slate-400 p-3">No matches</div>` :
                items.map((it, i) => `
                  <button data-palette-item="${it.id}" data-palette-idx="${i}" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-left text-sm ${i === idx ? "bg-blue-50" : "hover:bg-slate-50"}">
                    <span class="w-5 text-center text-slate-500">${it.icon}</span>
                    <span class="flex-1">
                      <div class="font-medium">${escape(it.label)}</div>
                      <div class="text-xs text-slate-500">${escape(it.hint)}</div>
                    </span>
                    ${it.kind === "doc" ? `<span class="text-[10px] text-slate-400">Open</span>` : ""}
                  </button>
                `).join("")
              }
            </div>
            <div class="border-t border-slate-200 px-4 py-2 flex items-center gap-3 text-[11px] text-slate-400">
              <span><kbd>↑</kbd> <kbd>↓</kbd> navigate</span>
              <span><kbd>↵</kbd> select</span>
              <span class="ml-auto">Command palette</span>
            </div>
          </div>
        </div>
      `;
    }

    // ---------- slash menu ----------
    const SLASH_ITEMS = [
      { id: "h1", label: "Heading 1", hint: "# Large section title", apply: (ed) => document.execCommand("formatBlock", false, "h1") },
      { id: "h2", label: "Heading 2", hint: "## Subsection", apply: () => document.execCommand("formatBlock", false, "h2") },
      { id: "h3", label: "Heading 3", hint: "### Smaller heading", apply: () => document.execCommand("formatBlock", false, "h3") },
      { id: "p", label: "Paragraph", hint: "Normal body text", apply: () => document.execCommand("formatBlock", false, "p") },
      { id: "ul", label: "Bullet list", hint: "• Unordered", apply: () => document.execCommand("insertUnorderedList") },
      { id: "ol", label: "Numbered list", hint: "1. Ordered", apply: () => document.execCommand("insertOrderedList") },
      { id: "hr", label: "Divider", hint: "Horizontal rule", apply: () => document.execCommand("insertHorizontalRule") },
      { id: "quote", label: "Quote", hint: "Blockquote", apply: () => document.execCommand("formatBlock", false, "blockquote") },
    ];

    function filteredSlash() {
      const q = state.slashQuery.toLowerCase();
      if (!q) return SLASH_ITEMS;
      return SLASH_ITEMS.filter(it => (it.label + " " + it.hint + " " + it.id).toLowerCase().includes(q));
    }

    function renderSlashMenu() {
      const items = filteredSlash();
      const idx = Math.min(state.slashIndex, Math.max(items.length - 1, 0));
      return `
        <div class="fixed z-40 bg-white border border-slate-200 rounded-lg shadow-xl w-72 fade-in" style="left:${state.slashMenu.x}px; top:${state.slashMenu.y}px">
          <div class="px-3 py-2 border-b border-slate-100 text-[11px] text-slate-500">Basic blocks ${state.slashQuery ? "· " + state.slashQuery : ""}</div>
          <div class="p-1 max-h-64 overflow-auto">
            ${items.length === 0 ? `<div class="text-xs text-slate-400 p-2">No matches</div>` :
              items.map((it, i) => `
                <button data-slash-item="${it.id}" data-slash-idx="${i}" class="w-full text-left px-3 py-2 rounded-md text-sm ${i === idx ? "bg-blue-50" : "hover:bg-slate-50"}">
                  <div class="font-medium">${escape(it.label)}</div>
                  <div class="text-xs text-slate-500">${escape(it.hint)}</div>
                </button>
              `).join("")
            }
          </div>
        </div>
      `;
    }

    // ---------- AI bubble ----------
    const AI_ACTIONS = [
      { id: "shorten", label: "Make shorter", icon: "↕" },
      { id: "expand", label: "Expand this", icon: "⇱" },
      { id: "grammar", label: "Fix grammar", icon: "✓" },
      { id: "rewrite", label: "Rewrite clearly", icon: "✎" },
      { id: "translate", label: "Translate to Spanish", icon: "🌐" },
      { id: "summarize", label: "Summarize", icon: "≡" },
    ];

    function renderAIBubble() {
      const b = state.aiBubble;
      return `
        <div class="fixed z-40 bg-white border border-slate-200 rounded-lg shadow-xl fade-in" style="left:${b.x}px; top:${b.y}px">
          ${b.open ? `
            <div class="w-60">
              <div class="px-3 py-2 border-b border-slate-100 flex items-center justify-between">
                <span class="text-[11px] text-slate-500">Ajaia AI · on your selection</span>
                <button id="ai-close" class="text-slate-400 hover:text-slate-700">✕</button>
              </div>
              <div class="p-1 max-h-64 overflow-auto">
                ${AI_ACTIONS.map(a => `<button data-ai-action="${a.id}" class="w-full text-left px-3 py-2 rounded-md text-sm hover:bg-slate-50"><span class="inline-block w-5 text-center">${a.icon}</span> ${escape(a.label)}</button>`).join("")}
              </div>
            </div>
          ` : `
            <div class="flex items-center gap-1 p-1">
              <button id="ai-open" class="px-2 py-1 text-xs rounded hover:bg-slate-100 text-slate-700 font-medium">✨ Ask AI</button>
              <span class="w-px h-4 bg-slate-200"></span>
              <button data-quick-ai="shorten" class="px-2 py-1 text-xs rounded hover:bg-slate-100">Shorter</button>
              <button data-quick-ai="rewrite" class="px-2 py-1 text-xs rounded hover:bg-slate-100">Rewrite</button>
            </div>
          `}
        </div>
      `;
    }

    // ---------- unauthorized ----------
    function renderUnauthorized() {
      return `
        ${renderTopBar()}
        <main class="max-w-md mx-auto mt-24 text-center p-6 bg-white border border-slate-200 rounded-lg fade-in">
          <div class="text-4xl mb-3">🚫</div>
          <h1 class="text-xl font-semibold mb-1">You don't have access</h1>
          <p class="text-sm text-slate-500 mb-4">This document either doesn't exist or isn't shared with you.</p>
          <button id="btn-back-home" class="text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-md px-3 py-2">Back to dashboard</button>
        </main>
      `;
    }

    // ---------- event wiring ----------
    function bind() {
      // login
      const loginForm = $("#login-form");
      if (loginForm) {
        loginForm.addEventListener("submit", e => {
          e.preventDefault();
          const email = $("#login-email").value.trim().toLowerCase();
          const u = USERS.find(x => x.email === email);
          if (!u || $("#login-password").value !== "password123") { toast("Invalid email or password", "error"); return; }
          state.user = u; state.view = "dashboard"; render();
        });
        $$("[data-seed-email]").forEach(b => b.addEventListener("click", () => {
          $("#login-email").value = b.dataset.seedEmail;
          $("#login-password").value = "password123";
        }));
      }

      // topbar
      $("#btn-logout")?.addEventListener("click", () => { state.user = null; state.view = "login"; state.focusMode = false; render(); });
      $("#user-switcher")?.addEventListener("change", e => {
        state.user = userById(e.target.value);
        if (state.view === "editor") {
          const doc = state.docs.find(d => d.id === state.activeDocId);
          if (!canAccess(doc, state.user.id)) state.view = "unauthorized";
        }
        render();
      });
      $("#btn-back")?.addEventListener("click", goHome);
      $("#btn-back-home")?.addEventListener("click", goHome);
      $("#btn-palette")?.addEventListener("click", openPalette);
      $("#btn-open-palette")?.addEventListener("click", openPalette);

      // dashboard
      $$("[data-open-doc]").forEach(b => b.addEventListener("click", () => openDoc(b.dataset.openDoc)));
      $("#btn-new")?.addEventListener("click", createNewDoc);
      $("#btn-import")?.addEventListener("click", () => $("#import-input")?.click());
      $("#import-input")?.addEventListener("change", handleImport);

      // editor
      const editor = $("#editor");
      if (editor) {
        editor.addEventListener("input", onEditorInput);
        editor.addEventListener("keydown", onEditorKeydown);
        editor.addEventListener("mouseup", onSelectionMaybeChanged);
        editor.addEventListener("keyup", onSelectionMaybeChanged);
        $("#doc-title").addEventListener("input", scheduleSave);
        $$("[data-cmd]").forEach(b => b.addEventListener("click", () => { exec(b.dataset.cmd); }));
        updateWordCount();
      }

      // outline
      $$("[data-outline-idx]").forEach(el => el.addEventListener("click", () => scrollToHeading(parseInt(el.dataset.outlineIdx))));

      // focus
      $("#btn-focus")?.addEventListener("click", () => { state.focusMode = !state.focusMode; render(); });

      // share
      $("#btn-share")?.addEventListener("click", () => { state.modal = "share"; render(); });
      $("#modal-close")?.addEventListener("click", () => { state.modal = null; render(); });
      $("#modal-bg")?.addEventListener("click", () => { state.modal = null; render(); });
      $("#share-form")?.addEventListener("submit", handleShare);
      $$("[data-remove-share]").forEach(b => b.addEventListener("click", () => {
        const doc = state.docs.find(d => d.id === state.activeDocId);
        doc.sharedWith = doc.sharedWith.filter(s => s.userId !== b.dataset.removeShare);
        render();
      }));

      // palette
      if (state.modal === "palette") {
        $("#palette-bg")?.addEventListener("click", closePalette);
        $("#palette-input")?.addEventListener("input", e => { state.paletteQuery = e.target.value; state.paletteIndex = 0; render(); });
        $$("[data-palette-item]").forEach(b => b.addEventListener("click", () => runPaletteItem(b.dataset.paletteItem)));
      }

      // slash
      if (state.slashMenu) {
        $$("[data-slash-item]").forEach(b => b.addEventListener("mousedown", e => { e.preventDefault(); applySlash(b.dataset.slashItem); }));
      }

      // AI bubble
      if (state.aiBubble) {
        $("#ai-open")?.addEventListener("mousedown", e => { e.preventDefault(); state.aiBubble.open = true; render(); });
        $("#ai-close")?.addEventListener("mousedown", e => { e.preventDefault(); state.aiBubble = null; render(); });
        $$("[data-ai-action]").forEach(b => b.addEventListener("mousedown", e => { e.preventDefault(); runAIAction(b.dataset.aiAction); }));
        $$("[data-quick-ai]").forEach(b => b.addEventListener("mousedown", e => { e.preventDefault(); runAIAction(b.dataset.quickAi); }));
      }
    }

    // ---------- navigation helpers ----------
    function goHome() { state.view = "dashboard"; state.activeDocId = null; state.focusMode = false; render(); }
    function openDoc(id) { state.activeDocId = id; state.view = "editor"; render(); }
    function openPalette() { state.modal = "palette"; state.paletteQuery = ""; state.paletteIndex = 0; render(); }
    function closePalette() { state.modal = null; render(); }
    function createNewDoc() {
      const id = "d" + Math.random().toString(36).slice(2, 8);
      state.docs.unshift({ id, title: "Untitled document", ownerId: state.user.id, sharedWith: [], updatedAt: Date.now(), html: "" });
      openDoc(id);
    }
    async function handleImport(e) {
      const f = e.target.files[0]; if (!f) return;
      if (!/\.(txt|md|markdown)$/i.test(f.name)) { toast("Only .txt and .md supported", "error"); return; }
      if (f.size > 1024 * 1024) { toast("File too large (>1 MB)", "error"); return; }
      const text = await f.text();
      const html = /\.md|\.markdown$/i.test(f.name) ? markdownToHtml(text) : text.split(/\n{2,}/).map(p => `<p>${escape(p).replace(/\n/g,"<br>")}</p>`).join("");
      const id = "d" + Math.random().toString(36).slice(2, 8);
      state.docs.unshift({ id, title: f.name.replace(/\.(txt|md|markdown)$/i, ""), ownerId: state.user.id, sharedWith: [], updatedAt: Date.now(), html });
      toast(`Imported ${f.name}`);
      openDoc(id);
    }

    function runPaletteItem(id) {
      closePalette();
      if (id === "new") createNewDoc();
      else if (id === "import") $("#import-input")?.click();
      else if (id === "focus") { state.focusMode = !state.focusMode; render(); }
      else if (id === "logout") { state.user = null; state.view = "login"; state.focusMode = false; render(); }
      else if (id.startsWith("doc_")) openDoc(id.replace("doc_", ""));
    }

    function handleShare(e) {
      e.preventDefault();
      const email = $("#share-email").value.trim().toLowerCase();
      const err = $("#share-error");
      err.classList.add("hidden");
      const doc = state.docs.find(d => d.id === state.activeDocId);
      const target = USERS.find(u => u.email === email);
      if (!email) return;
      if (!target) { err.textContent = "No seeded user with that email."; err.classList.remove("hidden"); return; }
      if (target.id === doc.ownerId) { err.textContent = "You can't share a doc with yourself."; err.classList.remove("hidden"); return; }
      if (doc.sharedWith.some(s => s.userId === target.id)) { err.textContent = "Already shared with this user."; err.classList.remove("hidden"); return; }
      doc.sharedWith.push({ userId: target.id });
      doc.updatedAt = Date.now();
      toast(`Shared with ${target.name}`);
      render();
    }

    // ---------- editor input + slash ----------
    function onEditorInput() {
      scheduleSave();
      updateOutline();
      updateWordCount();
      maybeOpenSlash();
    }

    function onEditorKeydown(e) {
      // Bold/italic/underline
      if ((e.ctrlKey || e.metaKey) && !e.shiftKey) {
        const k = e.key.toLowerCase();
        if (k === "b") { e.preventDefault(); exec("bold"); return; }
        if (k === "i") { e.preventDefault(); exec("italic"); return; }
        if (k === "u") { e.preventDefault(); exec("underline"); return; }
      }
      // Slash-menu nav
      if (state.slashMenu) {
        const items = filteredSlash();
        if (e.key === "ArrowDown") { e.preventDefault(); state.slashIndex = (state.slashIndex + 1) % Math.max(items.length, 1); render(); return; }
        if (e.key === "ArrowUp") { e.preventDefault(); state.slashIndex = (state.slashIndex - 1 + items.length) % Math.max(items.length, 1); render(); return; }
        if (e.key === "Enter") { e.preventDefault(); applySlash(items[state.slashIndex]?.id); return; }
        if (e.key === "Escape") { e.preventDefault(); state.slashMenu = null; state.slashQuery = ""; render(); return; }
        if (e.key === "Backspace" && state.slashQuery === "") {
          state.slashMenu = null; state.slashQuery = ""; render();
        } else if (e.key.length === 1) {
          // char will be picked up by input handler via maybeOpenSlash
        }
      }
    }

    function maybeOpenSlash() {
      const sel = window.getSelection();
      if (!sel || !sel.anchorNode) { state.slashMenu = null; state.slashQuery = ""; return; }
      const node = sel.anchorNode;
      const editor = $("#editor");
      if (!editor || !editor.contains(node)) return;
      // find nearest block element in editor
      let block = node.nodeType === 3 ? node.parentElement : node;
      while (block && block.parentElement !== editor) block = block.parentElement;
      if (!block) return;
      const text = block.textContent || "";
      const m = text.match(/(?:^|\s)\/([a-zA-Z]*)$/);
      if (m) {
        state.slashQuery = m[1];
        state.slashIndex = 0;
        // position menu near caret
        const range = sel.getRangeAt(0).cloneRange();
        range.collapse(true);
        const rect = range.getBoundingClientRect();
        const x = rect.left || 100;
        const y = (rect.bottom || 200) + 6;
        if (!state.slashMenu) state.slashMenu = { x, y };
        else { state.slashMenu.x = x; state.slashMenu.y = y; }
        render();
      } else if (state.slashMenu) {
        state.slashMenu = null;
        state.slashQuery = "";
        render();
      }
    }

    function applySlash(id) {
      if (!id) return;
      const item = SLASH_ITEMS.find(it => it.id === id);
      if (!item) return;
      // remove the '/query' trigger text first
      const sel = window.getSelection();
      if (sel && sel.anchorNode) {
        const range = sel.getRangeAt(0);
        const node = sel.anchorNode;
        if (node.nodeType === 3) {
          const text = node.textContent;
          const matchLen = (state.slashQuery || "").length + 1; // for the '/'
          const newText = text.slice(0, Math.max(0, range.endOffset - matchLen)) + text.slice(range.endOffset);
          node.textContent = newText;
          range.setStart(node, Math.max(0, range.endOffset - matchLen));
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
        }
      }
      item.apply();
      state.slashMenu = null; state.slashQuery = ""; state.slashIndex = 0;
      scheduleSave();
      render();
    }

    // ---------- AI bubble ----------
    function onSelectionMaybeChanged() {
      setTimeout(() => {
        const sel = window.getSelection();
        const editor = $("#editor");
        if (!sel || sel.isCollapsed || !editor) { state.aiBubble = null; render(); return; }
        // must be inside editor
        if (!editor.contains(sel.anchorNode) || !editor.contains(sel.focusNode)) { state.aiBubble = null; render(); return; }
        const text = sel.toString().trim();
        if (text.length < 2) { state.aiBubble = null; render(); return; }
        const range = sel.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        const x = Math.max(10, rect.left + rect.width / 2 - 80);
        const y = Math.max(10, rect.top - 42);
        state.aiBubble = { x, y, open: false, text, range: { start: range.startOffset, end: range.endOffset, container: range.startContainer } };
        render();
      }, 10);
    }

    function runAIAction(action) {
      if (!state.aiBubble) return;
      const text = state.aiBubble.text;
      // Stubbed AI response — in the real app this is /api/ai/rewrite
      const out = fakeAIResponse(text, action);
      // Replace the selection
      const sel = window.getSelection();
      if (sel && sel.rangeCount > 0) {
        const range = sel.getRangeAt(0);
        range.deleteContents();
        range.insertNode(document.createTextNode(out));
        sel.removeAllRanges();
      }
      state.aiBubble = null;
      toast(`Applied: ${action}`);
      scheduleSave();
      render();
    }

    function fakeAIResponse(text, action) {
      const t = text.trim();
      if (action === "shorten") {
        const words = t.split(/\s+/);
        return words.slice(0, Math.max(3, Math.ceil(words.length * 0.5))).join(" ");
      }
      if (action === "expand") return t + " " + "Additionally, this point matters because it sets up the next decision and gives collaborators the context they need to act without asking follow-up questions.";
      if (action === "grammar") return t.replace(/\s{2,}/g, " ").replace(/\bi\b/g, "I").replace(/\s+([,.!?])/g, "$1");
      if (action === "rewrite") return "In other words: " + t.replace(/\s+/g, " ").trim();
      if (action === "translate") return `[ES] ${t}`;
      if (action === "summarize") return `Summary: ${t.split(/[.!?]/)[0].trim()}.`;
      return t;
    }

    // ---------- editor ops ----------
    function exec(cmd) {
      const editor = $("#editor");
      editor?.focus();
      if (cmd === "h1" || cmd === "h2" || cmd === "h3" || cmd === "p") {
        document.execCommand("formatBlock", false, cmd === "p" ? "p" : cmd);
      } else if (cmd === "ul") document.execCommand("insertUnorderedList");
      else if (cmd === "ol") document.execCommand("insertOrderedList");
      else if (cmd === "hr") document.execCommand("insertHorizontalRule");
      else if (cmd === "quote") document.execCommand("formatBlock", false, "blockquote");
      else document.execCommand(cmd);
      scheduleSave();
      updateOutline();
      updateWordCount();
    }

    function updateOutline() {
      const container = $("#outline-container");
      const doc = state.docs.find(d => d.id === state.activeDocId);
      if (!container || !doc) return;
      // save the current html first
      doc.html = $("#editor").innerHTML;
      container.innerHTML = renderOutline(doc);
      $$("[data-outline-idx]", container).forEach(el => el.addEventListener("click", () => scrollToHeading(parseInt(el.dataset.outlineIdx))));
    }

    function scrollToHeading(idx) {
      const editor = $("#editor");
      if (!editor) return;
      const headings = editor.querySelectorAll("h1, h2, h3");
      const h = headings[idx];
      if (h) h.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function updateWordCount() {
      const editor = $("#editor"); const el = $("#word-count");
      if (!editor || !el) return;
      const text = (editor.textContent || "").trim();
      const words = text ? text.split(/\s+/).length : 0;
      const mins = Math.max(1, Math.round(words / 200));
      el.textContent = `${words} word${words === 1 ? "" : "s"} · ${mins} min read`;
    }

    function scheduleSave() {
      state.saveState = "saving";
      updateSaveIndicator();
      if (state.saveTimer) clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(() => {
        const doc = state.docs.find(d => d.id === state.activeDocId);
        if (!doc) return;
        doc.title = $("#doc-title")?.value || "Untitled document";
        doc.html = $("#editor")?.innerHTML || "";
        doc.updatedAt = Date.now();
        state.saveState = "saved";
        updateSaveIndicator();
      }, 800);
    }

    function updateSaveIndicator() {
      const el = $("#save-indicator");
      if (!el) return;
      if (state.saveState === "saving") el.textContent = "Saving…";
      else if (state.saveState === "saved") el.textContent = "Saved · just now";
      else if (state.saveState === "error") el.textContent = "Save failed";
    }

    // ---------- tiny markdown ----------
    function markdownToHtml(md) {
      const lines = md.split(/\r?\n/);
      const out = [];
      let listType = null;
      const closeList = () => { if (listType) { out.push(`</${listType}>`); listType = null; } };
      const inline = s => {
        s = escape(s);
        s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
        s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
        s = s.replace(/__([^_]+)__/g, "<u>$1</u>");
        return s;
      };
      for (const raw of lines) {
        const line = raw;
        let m;
        if ((m = line.match(/^#{1,3}\s+(.*)$/))) {
          closeList();
          const n = line.match(/^(#{1,3})/)[1].length;
          out.push(`<h${n}>${inline(m[1])}</h${n}>`);
        } else if ((m = line.match(/^[-*]\s+(.*)$/))) {
          if (listType !== "ul") { closeList(); out.push("<ul>"); listType = "ul"; }
          out.push(`<li>${inline(m[1])}</li>`);
        } else if ((m = line.match(/^\d+\.\s+(.*)$/))) {
          if (listType !== "ol") { closeList(); out.push("<ol>"); listType = "ol"; }
          out.push(`<li>${inline(m[1])}</li>`);
        } else if (line.trim() === "") closeList();
        else { closeList(); out.push(`<p>${inline(line)}</p>`); }
      }
      closeList();
      return out.join("");
    }

    // ---------- global hotkeys ----------
    window.addEventListener("keydown", e => {
      // Cmd/Ctrl+K opens palette
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        if (!state.user) return;
        e.preventDefault();
        if (state.modal === "palette") closePalette();
        else openPalette();
        return;
      }
      // Esc closes palette/modal/bubble
      if (e.key === "Escape") {
        if (state.modal === "palette") { closePalette(); return; }
        if (state.modal === "share") { state.modal = null; render(); return; }
        if (state.aiBubble) { state.aiBubble = null; render(); return; }
        if (state.focusMode) { state.focusMode = false; render(); return; }
      }
      // F toggles focus mode when not in input
      if (e.key.toLowerCase() === "f" && !(e.metaKey || e.ctrlKey) && !e.altKey && !e.shiftKey
          && state.view === "editor"
          && document.activeElement?.id !== "editor"
          && document.activeElement?.tagName !== "INPUT" && document.activeElement?.tagName !== "TEXTAREA") {
        e.preventDefault(); state.focusMode = !state.focusMode; render();
      }
      // Palette navigation
      if (state.modal === "palette") {
        const items = paletteItems();
        if (e.key === "ArrowDown") { e.preventDefault(); state.paletteIndex = (state.paletteIndex + 1) % Math.max(items.length, 1); render(); }
        if (e.key === "ArrowUp") { e.preventDefault(); state.paletteIndex = (state.paletteIndex - 1 + items.length) % Math.max(items.length, 1); render(); }
        if (e.key === "Enter") { e.preventDefault(); const sel = items[state.paletteIndex]; if (sel) runPaletteItem(sel.id); }
      }
    });

    render();
  </script>
</body>
</html>
